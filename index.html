  <title>Zeitnachweis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#f5f3ef;--surface:#ffffff;--surface2:#eeece8;
      --border:rgba(0,0,0,0.1);--border-strong:rgba(0,0,0,0.2);
      --text:#1a1a1a;--text-muted:#6b6860;--text-faint:#a09d97;
      --accent:#1a1a1a;--accent-text:#ffffff;
      --blue-bg:#e8f0fb;--blue-text:#1a4fa0;
      --green-bg:#e6f4e6;--green-text:#1e6b1e;
      --radius:12px;--radius-sm:8px;
      --tab-h:60px;--safe-bottom:env(safe-area-inset-bottom,0px);
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#161614;--surface:#1f1f1c;--surface2:#2a2a26;
      --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.15);
      --text:#f0ede8;--text-muted:#8a877f;--text-faint:#555350;
      --accent:#f0ede8;--accent-text:#1a1a1a;
      --blue-bg:#1a2a45;--blue-text:#7aabf0;
      --green-bg:#1a2e1a;--green-text:#6abf6a;
    }}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overflow:hidden;}
    #app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto;}
    .header{padding:16px 20px 12px;padding-top:calc(16px + env(safe-area-inset-top,0px));background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
    .header h1{font-size:22px;font-weight:600;letter-spacing:-0.3px;}
    .header .date{font-size:13px;color:var(--text-muted);margin-top:2px;font-family:'DM Mono',monospace;}
    .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px;padding-bottom:calc(var(--tab-h) + var(--safe-bottom) + 24px);}
    .tabbar{display:flex;background:var(--surface);border-top:1px solid var(--border);height:calc(var(--tab-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);flex-shrink:0;}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:none;cursor:pointer;color:var(--text-faint);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:8px 0;transition:color 0.15s;}
    .tab-btn.active{color:var(--text);}
    .tab-btn svg{width:22px;height:22px;stroke-width:1.8;}
    .tab-icon-dot{width:5px;height:5px;border-radius:50%;background:var(--text);margin:0 auto;opacity:0;transition:opacity 0.15s;}
    .tab-btn.active .tab-icon-dot{opacity:1;}
    .section{display:none;}.section.active{display:block;}
    .form-group{margin-bottom:14px;position:relative;}
    .form-label{font-size:12px;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;display:block;}
    input[type="text"],input[type="number"],input[type="date"],select{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;appearance:none;-webkit-appearance:none;outline:none;transition:border-color 0.15s;}
    input:focus,select:focus{border-color:var(--border-strong);}
    input::placeholder{color:var(--text-faint);}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .btn-save{width:100%;padding:16px;background:var(--accent);color:var(--accent-text);border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;margin-top:6px;}
    .btn-save:active{opacity:0.75;}
    .btn-save:disabled{opacity:0.6;cursor:default;}
    /* Autocomplete */
    .ac-list{position:absolute;top:calc(100% + 2px);left:0;right:0;z-index:200;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius-sm);overflow:hidden;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.12);}
    .ac-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);}
    .ac-item:last-child{border-bottom:none;}
    .ac-item:active{background:var(--surface2);}
    .ac-name{font-size:15px;font-weight:500;}
    .ac-komm{font-size:12px;color:var(--text-muted);margin-top:2px;font-family:'DM Mono',monospace;}
    .autofill-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;padding:3px 8px;border-radius:20px;background:var(--blue-bg);color:var(--blue-text);pointer-events:none;display:none;}
    /* Cards */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
    .card-date{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:4px;}
    .card-baustelle{font-size:16px;font-weight:600;}
    .card-komm{font-size:13px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:10px;margin-top:1px;}
    .card-pills{display:flex;gap:6px;flex-wrap:wrap;}
    .pill{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--surface2);color:var(--text-muted);font-weight:500;}
    .pill-h{background:var(--blue-bg);color:var(--blue-text);}
    .pill-k{background:var(--green-bg);color:var(--green-text);}
    .card-delete{float:right;background:none;border:none;cursor:pointer;color:var(--text-faint);font-size:18px;line-height:1;padding:0 0 4px 8px;}
    /* Metrics */
    .metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
    .metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
    .metric-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-muted);}
    .metric-value{font-size:26px;font-weight:600;letter-spacing:-0.5px;margin-top:4px;}
    .metric-sub{font-size:12px;color:var(--text-muted);}
    /* Month row */
    .month-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
    .month-row label{font-size:13px;color:var(--text-muted);white-space:nowrap;font-weight:500;}
    .month-row select{flex:1;padding:10px 14px;font-size:14px;}
    /* Export */
    .export-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;}
    .export-card h3{font-size:17px;font-weight:600;margin-bottom:4px;}
    .export-card .subtitle{font-size:14px;color:var(--text-muted);margin-bottom:16px;}
    .warn{color:#b45309;font-size:13px;margin-bottom:12px;padding:10px 12px;background:#fef3c7;border-radius:var(--radius-sm);}
    /* Settings */
    .settings-section{margin-bottom:24px;}
    .settings-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:10px;}
    /* Empty */
    .empty{text-align:center;padding:60px 20px;color:var(--text-faint);font-size:15px;}
    .empty-icon{font-size:36px;margin-bottom:12px;}
    .section-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:12px;}
    /* Toast */
    .toast{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bottom) + 16px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap;z-index:999;}
    .toast.show{opacity:1;}
    /* Spinner */
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--accent-text);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>

<body>
<div id="login-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;padding:32px;background:var(--bg);max-width:600px;margin:0 auto;">
  <div style="margin-bottom:32px;text-align:center;">
    <h1 style="font-size:26px;font-weight:600;letter-spacing:-0.5px;color:var(--text);">Zeitnachweis</h1>
    <p style="font-size:14px;color:var(--text-muted);margin-top:4px;">Bitte anmelden um fortzufahren</p>
  </div>
  <div style="width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;">
    <div class="form-group">
      <label class="form-label">E-Mail</label>
      <input type="email" id="login-email" placeholder="name@example.com" inputmode="email" autocomplete="email" style="background:#ffffff;color:#1a1a1a;border-color:var(--border-strong);border-radius:var(--radius-sm);font-size:15px;width:100%;box-sizing:border-box;padding:10px 14px;" />
    </div>
    <div class="form-group" style="margin-bottom:6px;">
      <label class="form-label">Passwort</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" style="background:#ffffff;color:#1a1a1a;border-color:var(--border-strong);border-radius:var(--radius-sm);font-size:15px;width:100%;box-sizing:border-box;padding:10px 14px;" />
    </div>
    <div id="login-error" style="font-size:13px;margin-bottom:12px;padding:10px 12px;border-radius:var(--radius-sm);display:none;"></div>
    <button class="btn-save" id="login-btn" onclick="doLogin()" style="margin-top:10px;">Anmelden</button>
    <div style="display:flex;align-items:center;gap:10px;margin:16px 0;">
      <div style="flex:1;height:1px;background:var(--border);"></div>

// ── DB-Operationen ─────────────────────────────────────────────────────────────
async function loadEntriesFromDB() {
  if (!currentUser) return;
  const { data, error } = await sb.from('eintraege')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('datum', { ascending: true });
  if (error) { console.error(error); return; }
  entries = data.map(r => ({
    id: r.id, datum: r.datum, baustelle: r.baustelle,
    kommission: r.kommission, stunden: r.stunden, km: r.km, notiz: r.notiz || ''
  }));
  fillMonthSelect('filter-month');
  fillMonthSelect('export-month');
}

async function saveEntryToDB(entry) {
  if (!currentUser) return null;
  const { data, error } = await sb.from('eintraege').insert([{
    user_id: currentUser.id,
    datum: entry.datum, baustelle: entry.baustelle,
    kommission: entry.kommission, stunden: entry.stunden,
    km: entry.km, notiz: entry.notiz
  }]).select().single();
  if (error) { console.error(error); return null; }
  return data;
}

async function deleteEntryFromDB(id) {
  if (!currentUser) return;
  const { error } = await sb.from('eintraege').delete().eq('id', id).eq('user_id', currentUser.id);
  if (error) console.error(error);
}

const MONTHS_DE=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const WDAYS=['So','Mo','Di','Mi','Do','Fr','Sa'];

const now=new Date();
document.getElementById('datum').value=now.toISOString().split('T')[0];
document.getElementById('header-date').textContent=
  WDAYS[now.getDay()]+', '+now.getDate()+'. '+MONTHS_DE[now.getMonth()]+' '+now.getFullYear();

let entries   =JSON.parse(localStorage.getItem('bauzeit_v3')||'[]');
let baustellen=JSON.parse(localStorage.getItem('bauzeit_baustellen')||'{}');
let settings  =JSON.parse(localStorage.getItem('bauzeit_settings')||'{}');
let kommissionEdited=false;

function persist(){
  // entries are now in Supabase - only save baustellen lookup locally
  localStorage.setItem('bauzeit_baustellen',JSON.stringify(baustellen));
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}

// Autocomplete
function onBaustelleInput(){
  kommissionEdited=false;
  document.getElementById('autofill-badge').style.display='none';
  const q=document.getElementById('baustelle').value.toLowerCase();
  const matches=Object.keys(baustellen).filter(b=>b.toLowerCase().includes(q));
  const list=document.getElementById('ac-list');
  if(!matches.length){list.style.display='none';return;}
  list.innerHTML=matches.map(b=>`
    <div class="ac-item" onmousedown="selectAC('${b.replace(/'/g,"\\'")}')">
      <div class="ac-name">${b}</div>
      <div class="ac-komm">${baustellen[b]}</div>
    </div>`).join('');
  list.style.display='block';
}
function selectAC(name){
  document.getElementById('baustelle').value=name;
  document.getElementById('kommission').value=baustellen[name]||'';
  document.getElementById('autofill-badge').style.display=baustellen[name]?'block':'none';
  kommissionEdited=false;hideSuggestions();
}
function hideSuggestions(){setTimeout(()=>{document.getElementById('ac-list').style.display='none';},150);}

// Eintrag speichern
async function saveEntry(){
  const datum     =document.getElementById('datum').value;
  const baustelle =document.getElementById('baustelle').value.trim();
  const kommission=document.getElementById('kommission').value.trim();
  const stunden   =parseFloat(document.getElementById('stunden').value.replace(',','.'))||0;
  const km        =parseFloat(document.getElementById('km').value)||0;
  const notiz     =document.getElementById('notiz').value.trim();
  if(!datum||!baustelle||!kommission||stunden<=0){toast('Bitte alle Pflichtfelder ausfüllen');return;}
  const btn=document.querySelector('#sec-eintrag .btn-save');
  btn.disabled=true; btn.textContent='Wird gespeichert…';
  baustellen[baustelle]=kommission;
  const entry={datum,baustelle,kommission,stunden,km,notiz};
  const saved=await saveEntryToDB(entry);
  if(saved){
    entries.push({id:saved.id,datum,baustelle,kommission,stunden,km,notiz});
    entries.sort((a,b)=>a.datum.localeCompare(b.datum));
    persist();
    ['baustelle','kommission','stunden','km','notiz'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('autofill-badge').style.display='none';
    kommissionEdited=false;
    toast('Eintrag gespeichert ✓');
  } else {
    toast('Fehler beim Speichern');
  }
  btn.disabled=false; btn.textContent='Eintrag speichern';
}

function availableMonths(){
  const set=[...new Set(entries.map(e=>e.datum.slice(0,7)))].sort().reverse();
  return set.length?set:[now.toISOString().slice(0,7)];
}
function fillMonthSelect(id){
  const sel=document.getElementById(id);const cur=sel.value;
  sel.innerHTML=availableMonths().map(m=>{
    const[y,mo]=m.split('-');
    return`<option value="${m}">${MONTHS_DE[parseInt(mo)-1]} ${y}</option>`;
  }).join('');
  if(cur&&availableMonths().includes(cur))sel.value=cur;
}
function formatDate(s){
  const d=new Date(s+'T12:00:00');
  return WDAYS[d.getDay()]+', '+d.getDate()+'. '+MONTHS_DE[d.getMonth()].slice(0,3)+'.';
}

// Übersicht
function renderOverview(){
  fillMonthSelect('filter-month');
  const month=document.getElementById('filter-month').value;
  const filtered=entries.filter(e=>e.datum.startsWith(month));
  const totalH=filtered.reduce((s,e)=>s+e.stunden,0);
  const totalKm=filtered.reduce((s,e)=>s+e.km,0);
  const totalB=[...new Set(filtered.map(e=>e.baustelle))].length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Stunden</div><div class="metric-value">${totalH.toFixed(1)}</div><div class="metric-sub">Std. gesamt</div></div>
    <div class="metric"><div class="metric-label">Kilometer</div><div class="metric-value">${Math.round(totalKm)}</div><div class="metric-sub">km gesamt</div></div>
    <div class="metric"><div class="metric-label">Einsätze</div><div class="metric-value">${filtered.length}</div><div class="metric-sub">Einträge</div></div>
    <div class="metric"><div class="metric-label">Baustellen</div><div class="metric-value">${totalB}</div><div class="metric-sub">verschiedene</div></div>`;
  const list=document.getElementById('entries-list');
  document.getElementById('entries-title').textContent=filtered.length?`${filtered.length} Einträge`:'';
  if(!filtered.length){list.innerHTML='<div class="empty"><div class="empty-icon">📋</div>Noch keine Einträge für diesen Monat</div>';return;}
  list.innerHTML=filtered.slice().reverse().map(e=>`
    <div class="card">
      <button class="card-delete" onclick="deleteEntry(${e.id})">×</button>
      <div class="card-date">${formatDate(e.datum)}</div>
      <div class="card-baustelle">${e.baustelle}</div>
      <div class="card-komm">${e.kommission}</div>
      <div class="card-pills">
        <span class="pill pill-h">${e.stunden.toFixed(1)} Std.</span>
        ${e.km>0?`<span class="pill pill-k">${e.km} km</span>`:''}
        ${e.notiz?`<span class="pill">${e.notiz}</span>`:''}
      </div>
    </div>`).join('');
}
async function deleteEntry(id){
  if(!confirm('Eintrag löschen?'))return;
  await deleteEntryFromDB(id);
  entries=entries.filter(e=>e.id!==id);
  renderOverview();
}

// Rechnung-Tab
function renderExport(){
  fillMonthSelect('export-month');
  const month=document.getElementById('export-month').value;
  const[y,mo]=month.split('-');
  const filtered=entries.filter(e=>e.datum.startsWith(month));
  const s=settings;
  const stundensatz=parseFloat(s.stundensatz)||42;
  const kmpauschale=parseFloat(s.kmpauschale)||0.40;
  const totalH=filtered.reduce((a,e)=>a+e.stunden,0);
  const totalKm=filtered.reduce((a,e)=>a+e.km,0);
  const netto=filtered.reduce((a,e)=>a+e.stunden*stundensatz+e.km*kmpauschale,0);
  const monthName=MONTHS_DE[parseInt(mo)-1]+' '+y;
  const content=document.getElementById('export-content');
  if(!filtered.length){content.innerHTML='<div class="empty"><div class="empty-icon">📄</div>Keine Einträge für diesen Monat</div>';return;}
  const settingsOk=s.iban&&s.steuernr&&s.bank;
  content.innerHTML=`
    <div class="export-card">
      <h3>${monthName}</h3>
      <div class="subtitle">${filtered.length} Einträge · ${totalH.toFixed(1)} Std. · ${Math.round(totalKm)} km · <strong>${netto.toFixed(2).replace('.',',')} €</strong></div>
      ${!settingsOk?'<div class="warn">⚠ Bitte zuerst die Einstellungen ausfüllen (Firmenname, Inhaber, IBAN).</div>':''}
      <div class="form-group"><label class="form-label">Empfänger – Firma</label><input type="text" id="exp-firma" placeholder="z.B. Elektro Würth GmbH" /></div>
      <div class="form-group"><label class="form-label">Empfänger – Straße</label><input type="text" id="exp-strasse" placeholder="z.B. Riedstraße 9" /></div>
      <div class="form-group"><label class="form-label">Empfänger – PLZ und Ort</label><input type="text" id="exp-plzort" placeholder="z.B. 79787 Lauchringen" /></div>
      <div class="form-group"><label class="form-label">Rechnungsnummer</label><input type="text" id="exp-rechnr" placeholder="z.B. 03/26" /></div>
      <button class="btn-save" id="btn-gen" onclick="generatePDF('${month}')">Rechnung als PDF erstellen</button>
    </div>`;
  // Standard-Empfänger aus Einstellungen vorausfüllen
  if(s['empf-firma'])  document.getElementById('exp-firma').value   = s['empf-firma'];
  if(s['empf-strasse'])document.getElementById('exp-strasse').value = s['empf-strasse'];
  if(s['empf-plzort']) document.getElementById('exp-plzort').value  = s['empf-plzort'];
}

// Rechnung generieren
async function generateRechnung(month){
  const btn=document.getElementById('btn-gen');
  btn.innerHTML='<span class="spinner"></span>Wird erstellt…';btn.disabled=true;
  try{
    const[y,mo]=month.split('-');
    const s=settings;
    // Fest hinterlegt (unkritisch, steht auf jeder Rechnung)
    const FIRMA   ='EHS Elektrotechnik und Hausservice';
    const INHABER ='Torsten Pieper';
    const STRASSE ='Sommerhalde 5';
    const PLZORT  ='79780 Stühlingen';
    const TELEFON ='07744 / 92 92 43';
    const MOBIL   ='0170 / 86 12 955';
    // Sensible Daten aus Einstellungen (localStorage, nicht im Code)
    const STEUERNR=s.steuernr||'';
    const BANK    ={name:s.bank||'',iban:s.iban||'',bic:s.bic||''};
    // Anpassbar in Einstellungen
    const STUNDENRATE=parseFloat(s.stundensatz)||42;
    const KM_PAUSCH  =parseFloat(s.kmpauschale)||0.40;
    const MWST_PCT   =0;

    const empfFirma  =document.getElementById('exp-firma').value.trim()||'Empfänger';
    const empfStrasse=document.getElementById('exp-strasse').value.trim()||'';
    const empfPlzort =document.getElementById('exp-plzort').value.trim()||'';
    const rechnr     =document.getElementById('exp-rechnr').value.trim()||'';

    // Heutiges Datum automatisch
    const heute=new Date();
    const datumHeute=heute.getDate()+'.'+(heute.getMonth()+1)+'.'+heute.getFullYear();
    const ortName=PLZORT.split(' ').slice(1).join(' ')||'';

    const filtered=entries.filter(e=>e.datum.startsWith(month));
    filtered.sort((a,b)=>{
      if(a.baustelle!==b.baustelle)return a.baustelle.localeCompare(b.baustelle);
      const p=d=>d.split('.').reverse().join('');return p(a.datum).localeCompare(p(b.datum));
    });

    const fmt=n=>n.toFixed(2).replace('.',',')+' \u20AC';

    const{Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,
      AlignmentType,BorderStyle,WidthType,ShadingType,VerticalAlign,
      UnderlineType,TabStopType}=docx;

    const noB={style:BorderStyle.NONE,size:0,color:'FFFFFF'};
    const noBs={top:noB,bottom:noB,left:noB,right:noB};
    const thinB={style:BorderStyle.SINGLE,size:1,color:'cccccc'};
    const thinBs={top:thinB,bottom:thinB,left:thinB,right:thinB};

    const r=(text,o={})=>new TextRun({text,font:'Arial',size:o.size||20,bold:o.bold||false,
      color:o.color||'000000',italics:o.italic||false,
      underline:o.underline?{type:UnderlineType.SINGLE}:undefined});
    const p=(children,o={})=>new Paragraph({alignment:o.align||AlignmentType.LEFT,
      spacing:{before:o.before||0,after:o.after||0},tabStops:o.tabs,
      children:Array.isArray(children)?children:[children]});
    const sp=(pt=8)=>p([r('')],{after:pt*20});

    const tc=(text,o={})=>{
      const{bold=false,size=18,color='000000',bg='FFFFFF',align=AlignmentType.LEFT,
            width=1000,borders=thinBs}=o;
      return new TableCell({borders,width:{size:width,type:WidthType.DXA},
        shading:{fill:bg,type:ShadingType.CLEAR},
        margins:{top:60,bottom:60,left:100,right:100},
        verticalAlign:VerticalAlign.CENTER,
        children:[new Paragraph({alignment:align,
          children:[new TextRun({text:String(text),bold,size,color,font:'Arial'})]})]}); };

    // Spalten
    const CW=[1377,746,2467,688,1377,551,1170,1262];
    const TW=CW.reduce((a,b)=>a+b,0);
    const HDRBG='f0ede8';
    const topLine={style:BorderStyle.SINGLE,size:4,color:'000000'};

    const headerRow=()=>new TableRow({tableHeader:true,children:
      ['Datum','Komm.','Kunde / Leistung','Std.',
        `\u00E0 ${STUNDENRATE.toFixed(0)},- \u20AC`,'km',
        `\u00E0 ${KM_PAUSCH.toFixed(2).replace('.',',')} \u20AC`,'Betrag']
      .map((l,i)=>tc(l,{bold:true,size:17,bg:HDRBG,width:CW[i],
        align:i>=3?AlignmentType.RIGHT:AlignmentType.LEFT,
        borders:{top:noB,left:noB,right:noB,bottom:topLine}}))});

    let totStunden=0,totKmBetrag=0,totNetto=0;
    const dataRows=filtered.map((e,i)=>{
      const sb=e.stunden*STUNDENRATE,kb=e.km*KM_PAUSCH,gs=sb+kb;
      totStunden+=e.stunden;totKmBetrag+=kb;totNetto+=gs;
      const bg=i%2===1?'f9f9f9':'FFFFFF';
      return new TableRow({children:[
        tc((d=>{const[y,m,t]=d.split('-');return t+'.'+m+'.'+y;})(e.datum), {width:CW[0],bg,size:18}),
        tc(e.kommission,                         {width:CW[1],bg,size:18}),
        tc(e.baustelle,                          {width:CW[2],bg,size:18}),
        tc(String(e.stunden).replace('.',','),   {width:CW[3],bg,size:18,align:AlignmentType.RIGHT}),
        tc(fmt(sb),                              {width:CW[4],bg,size:18,align:AlignmentType.RIGHT}),
        tc(e.km||'\u2013',                       {width:CW[5],bg,size:18,align:AlignmentType.RIGHT}),
        tc(fmt(kb),                              {width:CW[6],bg,size:18,align:AlignmentType.RIGHT}),
        tc(fmt(gs),                              {width:CW[7],bg,size:18,align:AlignmentType.RIGHT}),
      ]});
    });

    const sumBs={top:topLine,bottom:noB,left:noB,right:noB};
    const sumRow=new TableRow({children:[
      tc('',{width:CW[0],borders:sumBs}),tc('',{width:CW[1],borders:sumBs}),
      tc('',{width:CW[2],borders:sumBs}),tc('',{width:CW[3],borders:sumBs}),
      tc(fmt(totStunden*STUNDENRATE),{width:CW[4],bold:true,size:18,align:AlignmentType.RIGHT,borders:sumBs}),
      tc('',{width:CW[5],borders:sumBs}),
      tc(fmt(totKmBetrag),{width:CW[6],bold:true,size:18,align:AlignmentType.RIGHT,borders:sumBs}),
      tc(fmt(totNetto),   {width:CW[7],bold:true,size:18,align:AlignmentType.RIGHT,borders:sumBs}),
    ]});

    const tabelle=new Table({width:{size:TW,type:WidthType.DXA},columnWidths:CW,
      rows:[headerRow(),...dataRows,sumRow]});

    const mwstBetrag=totNetto*(MWST_PCT/100);
    const rechnungsbetrag=totNetto+mwstBetrag;

    const sumLine=(label,value,bold=false,underline=false)=>new Paragraph({
      alignment:AlignmentType.RIGHT,spacing:{before:40,after:40},
      children:[new TextRun({text:label+'    ',font:'Arial',size:19,bold}),
        new TextRun({text:value,font:'Arial',size:19,bold,
          underline:underline?{type:UnderlineType.SINGLE}:undefined})]});

    const infoLine=(label,value)=>new Table({
      width:{size:5838,type:WidthType.DXA},columnWidths:[2200,3638],
      rows:[new TableRow({children:[
        new TableCell({borders:noBs,width:{size:2200,type:WidthType.DXA},
          margins:{top:20,bottom:20,left:0,right:60},
          children:[new Paragraph({children:[r(label,{size:19})]})]}),
        new TableCell({borders:noBs,width:{size:3638,type:WidthType.DXA},
          margins:{top:20,bottom:20,left:0,right:0},
          children:[new Paragraph({alignment:AlignmentType.RIGHT,children:[r(value,{size:19})]})]}),
      ]})]});

    const briefkopfZeile=[STRASSE,PLZORT,TELEFON&&'Telefon '+TELEFON,MOBIL&&'Mobil '+MOBIL].filter(Boolean).join('  ');

    const doc2=new Document({
      styles:{default:{document:{run:{font:'Arial',size:20}}}},
      sections:[{
        properties:{page:{size:{width:11906,height:16838},margin:{top:851,right:1134,bottom:1134,left:1134}}},
        children:[
          p([r(FIRMA,{bold:true,size:26,underline:true})],{align:AlignmentType.CENTER}),
          p([r(INHABER,{size:20})],{align:AlignmentType.CENTER}),
          p([r(briefkopfZeile,{size:17})],{align:AlignmentType.CENTER}),
          sp(16),
          p([r(`${INHABER}, ${STRASSE}, ${PLZORT}`,{size:16,underline:true})],{after:80}),
          sp(4),
          new Table({width:{size:TW,type:WidthType.DXA},columnWidths:[3800,5838],
            rows:[new TableRow({children:[
              new TableCell({borders:noBs,width:{size:3800,type:WidthType.DXA},children:[
                p([r(empfFirma,{bold:true,size:22})],{after:40}),
                p([r(empfStrasse,{size:20})],{after:40}),
                p([r(empfPlzort,{size:20})]),
              ]}),
              new TableCell({borders:noBs,width:{size:5838,type:WidthType.DXA},children:[
                infoLine((ortName?ortName+', ':'')+'den',datumHeute),
                infoLine('Rechnungsnummer.:',rechnr),
                ...(STEUERNR?[infoLine('Steuernummer:',STEUERNR)]:[]),
                ...(BANK.name?[infoLine('Smartkonto:',BANK.name)]:[]),
                ...(BANK.iban?[infoLine('IBAN:',BANK.iban)]:[]),
                ...(BANK.bic ?[infoLine('BIC:',BANK.bic)] :[]),
              ]}),
            ]})]
          }),
          sp(20),
          p([r('Rechnung',{bold:true,size:28})],{after:120}),
          p([r('F\u00FCr ausgef\u00FChrte Leistungen erlaube ich mir zu berechnen:')],{after:160}),
          tabelle,
          sp(10),
          sumLine('Netto',fmt(totNetto)),
          sumLine(`MwSt ${MWST_PCT.toFixed(2).replace('.',',')}%`,mwstBetrag>0?fmt(mwstBetrag):'- \u20AC',false,true),
          sp(4),
          sumLine('Rechnungsbetrag: ',fmt(rechnungsbetrag),true),
          sp(24),
          p([r('Nach \u00A7 13b geht die Steuerschuldnerschaft auf den Leistungsempf\u00E4nger \u00FCber.',{size:18})],{after:80}),
          p([r('Bitte \u00FCberweisen Sie den Rechnungsbetrag auf das angegebene Konto.',{size:18})]),
        ]
      }]
    });

    const blob=await Packer.toBlob(doc2);
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`Rechnung_${month}_${empfFirma.replace(/\s+/g,'_')}.docx`;
    a.click();
    toast('Rechnung erstellt ✓');
  }catch(err){console.error(err);toast('Fehler – Konsole prüfen');}
  btn.innerHTML='Rechnung als PDF erstellen';btn.disabled=false;
}

// Einstellungen
function loadSettings(){
  ['steuernr','bank','iban','bic','stundensatz','kmpauschale','empf-firma','empf-strasse','empf-plzort']
    .forEach(f=>{const el=document.getElementById('s-'+f);if(el&&settings[f])el.value=settings[f];});
}
function saveSettings(){
  ['steuernr','bank','iban','bic','stundensatz','kmpauschale','empf-firma','empf-strasse','empf-plzort']
    .forEach(f=>{const el=document.getElementById('s-'+f);if(el)settings[f]=el.value.trim();});
  localStorage.setItem('bauzeit_settings',JSON.stringify(settings));
  toast('Einstellungen gespeichert ✓');
}

function switchTab(name){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='uebersicht')renderOverview();
  if(name==='export')renderExport();
  if(name==='settings')loadSettings();
}

fillMonthSelect('filter-month');
fillMonthSelect('export-month');
loadSettings();
initAuth();

// ── PDF Rechnung generieren ────────────────────────────────────────────────────
async function generatePDF(month) {
  const btn = document.getElementById('btn-gen');
  btn.innerHTML = '<span class="spinner"></span>Wird erstellt…';
  btn.disabled = true;

  try {
    const [y, mo] = month.split('-');
    const monthName = MONTHS_DE[parseInt(mo)-1] + ' ' + y;
    const s = settings;

    const FIRMA    = 'EHS Elektrotechnik und Hausservice';
    const INHABER  = 'Torsten Pieper';
    const STRASSE  = 'Sommerhalde 5';
    const PLZORT   = '79780 Stühlingen';
    const TELEFON  = '07744 / 92 92 43';
    const MOBIL    = '0170 / 86 12 955';
    const STEUERNR = s.steuernr || '';
    const BANK     = { name: s.bank||'', iban: s.iban||'', bic: s.bic||'' };
    const STUNDENRATE = parseFloat(s.stundensatz) || 42;
    const KM_PAUSCH   = parseFloat(s.kmpauschale) || 0.40;

    const empfFirma   = document.getElementById('exp-firma').value.trim()   || '';
    const empfStrasse = document.getElementById('exp-strasse').value.trim() || '';
    const empfPlzort  = document.getElementById('exp-plzort').value.trim()  || '';
    const rechnr      = document.getElementById('exp-rechnr').value.trim()  || '';

    const heute = new Date();
    const datumHeute = heute.getDate() + '.' + (heute.getMonth()+1) + '.' + heute.getFullYear();

    const filtered = entries.filter(e => e.datum.startsWith(month));
    filtered.sort((a, b) => {
      if (a.baustelle !== b.baustelle) return a.baustelle.localeCompare(b.baustelle);
      const p = d => d.split('.').reverse().join('');
      return p(a.datum).localeCompare(p(b.datum));
    });

    const fmt = n => n.toFixed(2).replace('.', ',') + ' €';

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ format: 'a4', unit: 'mm' });

    const PW = 210, PH = 297;
    const ML = 20, MR = 20, MT = 15;
    const CW = PW - ML - MR; // 170mm content width
    let y2 = MT;

    // ── Briefkopf ──
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(0);
    const fw = doc.getTextWidth(FIRMA);
    doc.text(FIRMA, PW/2, y2, { align: 'center' });
    // Underline
    doc.setLineWidth(0.4);
    doc.line(PW/2 - fw/2, y2+0.5, PW/2 + fw/2, y2+0.5);
    y2 += 5.5;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.text(INHABER, PW/2, y2, { align: 'center' });
    y2 += 4.5;
    doc.setFontSize(8.5);
    doc.text(`${STRASSE}  ${PLZORT}  Telefon ${TELEFON}  Mobil ${MOBIL}`, PW/2, y2, { align: 'center' });
    y2 += 8;

    // ── Absenderzeile (DIN 5008: ~40mm vom oberen Rand) ──
    const ADDR_Y = 40;
    doc.setFontSize(8);
    doc.setTextColor(80);
    const absLine = `${INHABER}, ${STRASSE}, ${PLZORT}`;
    doc.text(absLine, ML, ADDR_Y);
    doc.setLineWidth(0.2);
    doc.line(ML, ADDR_Y+0.8, ML + doc.getTextWidth(absLine), ADDR_Y+0.8);
    doc.setTextColor(0);

    // ── Empfänger links + Info rechts – beide ab gleicher Höhe (DIN-Fenster ~47mm) ──
    const BLOCK_Y = 47;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.text(empfFirma, ML, BLOCK_Y);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.text(empfStrasse, ML, BLOCK_Y+5.5);
    doc.text(empfPlzort,  ML, BLOCK_Y+10.5);

    // Info block right side – startet auf gleicher Höhe
    const infoLeft = ML + CW * 0.65;
    const infoRight = ML + CW;
    const infoLines = [
      [`${PLZORT.split(' ').slice(1).join(' ')}, den`, datumHeute],
      ['Rechnungsnummer.:', rechnr],
      ...(STEUERNR ? [['Steuernummer:', STEUERNR]] : []),
      ...(BANK.name ? [['Smartkonto:', BANK.name]] : []),
      ...(BANK.iban ? [['IBAN:', BANK.iban]] : []),
      ...(BANK.bic  ? [['BIC:',  BANK.bic]]  : []),
    ];
    doc.setFontSize(9.5);
    infoLines.forEach(([label, val], i) => {
      const iy = BLOCK_Y + i * 5;
      doc.setFont('helvetica', 'normal');
      doc.text(label, infoLeft, iy);
      doc.text(val, infoRight, iy, { align: 'right' });
    });

    y2 = BLOCK_Y + infoLines.length * 5 + 10;

    // ── Rechnung Titel ──
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(14);
    doc.text('Rechnung', ML, y2);
    y2 += 5.5;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9.5);
    doc.text('Für ausgeführte Leistungen erlaube ich mir zu berechnen:', ML, y2);
    y2 += 5;

    // ── Tabelle ──
    let totStunden = 0, totKmBetrag = 0, totNetto = 0;
    const tableRows = filtered.map(e => {
      const sb = e.stunden * STUNDENRATE;
      const kb = e.km * KM_PAUSCH;
      const gs = sb + kb;
      totStunden  += e.stunden;
      totKmBetrag += kb;
      totNetto    += gs;
      const [ey, em, ed] = e.datum.split('-');
      return [
        ed+'.'+em+'.'+ey,
        e.kommission,
        e.baustelle,
        String(e.stunden).replace('.',','),
        fmt(sb),
        String(e.km),
        fmt(kb),
        fmt(gs)
      ];
    });

    doc.autoTable({
      startY: y2,
      head: [['Datum','Komm.','Kunde / Leistung','Std.',
        `à ${STUNDENRATE.toFixed(0)},- €`,'km',
        `à ${KM_PAUSCH.toFixed(2).replace('.',',')} €`,'Betrag']],
      body: tableRows,
      foot: [[
        '','','','',
        fmt(totStunden * STUNDENRATE),
        '',
        fmt(totKmBetrag),
        fmt(totNetto)
      ]],
      margin: { left: ML, right: MR },
      tableWidth: CW,
      styles: { font: 'helvetica', fontSize: 8.5, cellPadding: 1.8, textColor: 0, lineColor: 200, lineWidth: 0.2 },
      headStyles: { fillColor: [240, 237, 232], textColor: 0, fontStyle: 'bold', halign: 'left' },
      footStyles: { fillColor: 255, textColor: 0, fontStyle: 'bold' },
      columnStyles: {
        0: { cellWidth: 22 },
        1: { cellWidth: 14 },
        2: { cellWidth: 46 },
        3: { cellWidth: 10, halign: 'right' },
        4: { cellWidth: 22, halign: 'right' },
        5: { cellWidth: 10, halign: 'right' },
        6: { cellWidth: 22, halign: 'right' },
        7: { cellWidth: 24, halign: 'right' },
      },
      didParseCell: (data) => {
        if (data.section === 'foot') data.cell.styles.halign = 'right';
        if (data.section === 'foot' && (data.column.index === 0 || data.column.index === 1 || data.column.index === 2 || data.column.index === 3 || data.column.index === 5)) {
          data.cell.styles.fillColor = 255;
        }
      }
    });

    y2 = doc.lastAutoTable.finalY + 8;

    // ── Summenblock ──
    const sumRight = ML + CW;
    const sumLeft  = sumRight - 60;
    doc.setFontSize(9.5);

    doc.setFont('helvetica', 'normal');
    doc.text('Netto', sumLeft, y2);
    doc.text(fmt(totNetto), sumRight, y2, { align: 'right' });
    y2 += 5;

    doc.text(`MwSt 0,00%`, sumLeft, y2);
    doc.setLineWidth(0.3);
    doc.line(sumLeft + 32, y2+0.6, sumRight, y2+0.6);
    doc.text('- €', sumRight, y2, { align: 'right' });
    y2 += 8;

    doc.setFont('helvetica', 'bold');
    doc.text('Rechnungsbetrag:', sumLeft, y2);
    doc.text(fmt(totNetto), sumRight, y2, { align: 'right' });
    y2 += 12;

    // ── Fußnoten ──
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.text('Nach § 13b geht die Steuerschuldnerschaft auf den Leistungsempfänger über.', ML, y2);
    y2 += 5;
    doc.text('Bitte überweisen Sie den Rechnungsbetrag auf das angegebene Konto.', ML, y2);

    // ── Download ──
    const filename = `Rechnung_${month}_${empfFirma.replace(/\s+/g,'_') || 'Rechnung'}.pdf`;
    doc.save(filename);
    toast('PDF erstellt ✓');

  } catch(err) {
    console.error(err);
    toast('Fehler – Konsole prüfen');
  }

  btn.innerHTML = 'Rechnung als PDF erstellen';
  btn.disabled = false;
}

</script>
